name: 🚀 Production Deploy - GitHub Pages

on:
  push:
    branches: [main]

  workflow_dispatch:

# -------------------------
# Strict permissions (least privilege)
# -------------------------
permissions:
  contents: read
  pages: write
  id-token: write

# -------------------------
# Prevent race conditions
# -------------------------
concurrency:
  group: pages-production
  cancel-in-progress: true

jobs:
  build:
    name: 🧱 Build & Export
    runs-on: ubuntu-latest

    env:
      NODE_ENV: production

    steps:
      # -------------------------
      # Checkout source
      # -------------------------
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # -------------------------
      # Setup Node (pinned = stability)
      # -------------------------
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # -------------------------
      # Clean install (SRE best practice)
      # -------------------------
      - name: 🧼 Clean install dependencies
        run: |
          npm ci

      # -------------------------
      # Build (Next.js + Nextra export)
      # -------------------------
      - name: 🏗️ Build static site
        run: |
          npm run build

      # -------------------------
      # Verify output (critical safety gate)
      # -------------------------
      - name: 🔍 Verify build output
        run: |
          test -d out || (echo "❌ out/ not found! Build failed" && exit 1)
          ls -la out

      # -------------------------
      # Upload artifact safely
      # -------------------------
      - name: 📦 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    name: 🚀 Deploy to Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # -------------------------
      # Deploy step
      # -------------------------
      - name: 🚀 Deploy
        id: deployment
        uses: actions/deploy-pages@v4