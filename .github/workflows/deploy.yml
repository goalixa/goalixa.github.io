name: 🚀 Production Deploy - GitHub Pages

on:
  push:
    branches: [main]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-production
  cancel-in-progress: true

jobs:
  build:
    name: 🧱 Build & Export
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # -------------------------
      # Setup Node
      # -------------------------
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # -------------------------
      # Install dependencies (FIXED)
      # -------------------------
      - name: 🧼 Install dependencies
        run: |
          npm install --no-audit --no-fund --include=dev

      # -------------------------
      # Build
      # -------------------------
      - name: 🏗️ Build static site
        run: npm run build

      # -------------------------
      # Verify output
      # -------------------------
      - name: 🔍 Verify build output
        run: |
          test -d out || (echo "❌ out/ not found! Build failed" && exit 1)
          ls -la out

      # -------------------------
      # Upload artifact
      # -------------------------
      - name: 📦 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    name: 🚀 Deploy to Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🚀 Deploy
        id: deployment
        uses: actions/deploy-pages@v4