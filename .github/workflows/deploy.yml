name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # Node + Cache
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # =========================
      # Install dependencies (SAFE)
      # =========================
      - name: Install dependencies
        run: |
          npm ci
          echo "Checking Next.js installation..."
          ls node_modules/.bin | grep next

      # =========================
      # Build (SAFE via npx)
      # =========================
      - name: Build Next.js app
        run: npx next build

      # =========================
      # Export static site
      # =========================
      - name: Export static site
        run: npm run export

      # =========================
      # Upload artifact
      # =========================
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4